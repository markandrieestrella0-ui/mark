<!DOCTYPE html>
<html>

<head>
<title>ACTIVITY 3</title>
<link rel="stylesheet" href="css/ACT3.css">
<style>

  .header {
    text-align: center;
    }

  body {
    background-color: blue;
    font-family: Arial;
    color: red;
    padding: 20px;
  }


 .three-space {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 40px;
  margin: 40px;
  width: auto;

}

 .two-space {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  margin: 50px;
  width: auto;

}

</style>
</head>
<body>

  <div class="header">
            <h1>ACTIVITY 3</h1>
            <p>estrella Mark Andrie E.</p>

   <div class="three-space">
  <div>
    <h3>2a. Uber</h3>
    <button class="Uber-button">Request now</button>
  </div>

  <div>
    <h3>2b. Amazon</h3>
    <button class="Amazon-button">Add to Cart</button>
  </div>

  <div>
    <h3>2c. GitHub</h3>
    <button class="GitHub-button">Sign up</button>
  </div>
</div>
  
  <div class="two-space">
      <div>
    <h3>2d. Bootstrap</h3>
    <button class="Bootstrap-get">Get started</button>
    <button class="Bootstrap-download">Download</button>
  </div>

  <div>
    <h3>2e. LinkedIn</h3>
    <button class="LinkedIn-apply">Apply on company website</button>
    <button class="LinkedIn-save">Save</button>
  </div>
  </div>
  </div>

</body>
</html>
