<!DOCTYPE html>
<html>

<head>
<title>ACTIVITY 2</title>

<style>

  body {
    background-color: black;
    font-family: Arial;
    color: white;
    padding: 20px;
  }


 .three-space {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 40px;
  margin: 40px;
  width: auto;

}

 .two-space {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  margin: 40px;
  width: auto;

}

  .Uber-button {
    background-color: red(0, 0, 0);
    color: rgb(202, 194, 194);
    border: 2px solid white;
    padding: 14px 26px;
    cursor: pointer;
  }


  .Amazon-button {
    background-color: yellow(255,216,20);
    color:white (0, 0, 0);
    padding: 12px 50px;
    border-radius: 30px;
    cursor: pointer;
  }
  .GitHub-button {
    background-color: blue (46,164,79);
    color: rgb(207, 207, 239);
    padding: 12px 20px;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
  }

  .Bootstrap-get {
    background-color: rgb(248, 255, 189);
    color: rgb(255, 255, 255);
    padding: 12px 20px;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
  }

  .Bootstrap-download {
    background-color: rgb(227, 242, 240);
    color: rgb(137, 70, 143);
    border: 2px solid rgb(142, 96, 211);
    padding: 12px 20px;
    border-radius: 5px;
    cursor: pointer;
  }

  .LinkedIn-apply {
    background-color: rgb(10,102,194);
    color: rgb(158, 235, 173);
    padding: 14px 30px;
    border-radius: 30px;
    font-weight: bold;
    width: 260px;
    text-align: center;
    cursor: pointer;
  }

  .LinkedIn-save {
    background-color: rgb(248, 119, 119);
    color: rgb(91, 96, 101);
    border: 2px solid rgb(143, 151, 124);
    padding: 12px 20px;
    border-radius: 30px;
    font-weight: bold;
    cursor: pointer;
  }


</style>
</head>
<body>

  
   <div class="three-space">
  <div>
    <h3>2a. Uber</h3>
    <button class="Uber-button">Request now</button>
  </div>

  <div>
    <h3>2b. Amazon</h3>
    <button class="Amazon-button">Add to Cart</button>
  </div>

  <div>
    <h3>2c. GitHub</h3>
    <button class="GitHub-button">Sign up</button>
  </div>
</div>
  
  <div class="two-space">
      <div>
    <h3>2d. Bootstrap</h3>
    <button class="Bootstrap-get">Get started</button>
    <button class="Bootstrap-download">Download</button>
  </div>

  <div>
    <h3>2e. LinkedIn</h3>
    <button class="LinkedIn-apply">Apply on company website</button>
    <button class="LinkedIn-save">Save</button>
  </div>
  </div>
  </div>

</body>
</html>
